      <th>verdict</th>
      </tr>${rows}</table>
    <div class="legend">The axial force in each brace splits into <b>K</b> (balanced against a neighbour across a gap), <b>X</b> (through the chord to the opposite side) and <b>Y</b> (beam shear); sub-rows break K down per gap. The check is the chord-wall check at each brace footprint. K-balance gate = ${gatePct.toFixed(0)}% ${gatePct>0?'(near-balanced braces are treated as 100% K)':'(honest breakdown, no rounding)'}. ${env?'Envelope: each brace shows its governing load effect. ':''}<span class="muted">Click a brace row for the detailed check.</span></div></div>`;
}

function render(){
  if(!DATA) return;
  if(PAGE==='results') return renderResults();
  return renderConnection();
}

// ---- detailed-check modal: full NORSOK 6.4 breakdown for one brace in one LE ----
// number formatters for the transparent step-by-step formula cards
const fN = (x,d=3) => (x==null||!isFinite(x)) ? '—' : x.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d,useGrouping:false});
// "plus-context": wraps negatives in parentheses so "a + (−b)" reads cleanly in a substituted formula
const fp = (x,d=3) => { const s=fN(x,d).replace('-','−'); return (isFinite(x)&&x<0) ? `(${s})` : s; };
function step(label, symbolic, numeric, result, cls){
  const c = cls ? ' k'+cls : '';
  const tag = cls ? `<span class="tag tag${cls}">${cls}</span>` : '';
  return `<div class="step${c}">
    <div class="lbl">${tag}${label}</div>
    <div class="ln">\\(${symbolic}\\)</div>
    ${numeric?`<div class="ln">\\(=\\;${numeric}\\)</div>`:''}
    <div class="ln res">\\(=\\;${result}\\)</div>
  </div>`;
}
// side label: +1/'+' -> "+ey face", -1/'-' -> "−ey face" — THE single wording for chord-face side,
// used everywhere (gap table, brace-forces table, detail modal, 2D schematic). Accepts either the
// numeric side (+1/-1, used by extract's chord/brace-force output) or the string side ('+'/'-', used
// by extract's gaps output) — audit flagged three DIFFERENT wordings across the UI for the same concept
// ("face +" / "+ey face" / "(+)"), which made engineers second-guess whether they meant the same thing.
const sideLbl = s => (s==null ? '—' : ((s==='+'||s>=0) ? '+ey face' : '−ey face'));
const sideLblShort = s => (s==null ? '—' : ((s==='+'||s>=0) ? '(+ey)' : '(−ey)'));
function showCheckDetail(leId, braceName){
  // keyed by the load effect's STABLE id, not its display name — LE names are user-editable and not
  // guaranteed unique (e.g. two copy-pasted LCs both named "LC1"); an id lookup can never open the
  // wrong load effect the way a name lookup could.
  const jc=(DATA.joint_checks||[]).find(le=>le.id===leId);
  const leName=(jc&&jc.name)!=null?jc.name:String(leId);
  uiLog('info','showCheckDetail '+leName+' / '+braceName);
  const b=jc && (jc.braces||[]).find(x=>x.name===braceName);
  if(!b || b.skipped){ uiLog('warn','showCheckDetail: no check row for '+leName+'/'+braceName); return; }
  const i=b.inputs||{}, cd=b.chord_deriv||{};
  const u3=U.num, pc=U.pct, deg=U.deg;
  const mpa=v=>(v==null?'—':U.stress(v)+' '+U.sU());
  // formula substitution is written in MPa/mm/kN (matches the norm's own numeric convention) regardless
  // of the display-unit setting — a raw unit-agnostic conversion, NOT U.stress/U.len/U.force.
  const MPa=v=>(v==null?NaN:v/1e6), mm=v=>(v==null?NaN:v*1e3), kN=v=>(v==null?NaN:v/1e3);
  const ok=b.passed, col=ok?'#1a7f37':'#c0392b';
  const dom=b.dom_class||'K';
  const pcTex=v=>(v==null?'{-}':`${(v*100).toFixed(UNITS.dpPercent)}\\%`);
  // geometry + material
  const geo=`<div class="sec"><h4>Geometry &amp; material</h4><div class="kv">
    <span class="k">Chord Ø D × T</span><span class="v">${U.secLen(i.D)}×${U.secLen(i.T)} ${U.slU()} (f_y=${mpa(i.fy_chord)})</span>
    <span class="k">Brace Ø d × t</span><span class="v">${U.secLen(i.d)}×${U.secLen(i.t)} ${U.slU()} (f_y=${mpa(i.fy_brace)})</span>
    <span class="k">θ (brace–chord)</span><span class="v">${deg(i.theta_deg)}</span>
    <span class="k">chord face</span><span class="v">${sideLbl(cd.side)}</span>
    <span class="k">β = d/D</span><span class="v">${u3(i.beta)}</span>
    <span class="k">γ = D/(2T)</span><span class="v">${u3(i.gamma)}</span>
    <span class="k">τ = t/T</span><span class="v">${u3(i.tau)}</span>
    <span class="k">classification</span><span class="v">K ${pc(i.frK)} · Y ${pc(i.frY)} · X ${pc(i.frX)}</span>
    <span class="k">γ_M</span><span class="v">${u3(i.gamma_M)}</span></div></div>`;
  // applied forces
  const forces=`<div class="sec"><h4>Applied forces (in the joint plane)</h4><div class="kv">
    <span class="k">N_Sd (+ tension)</span><span class="v">${U.force(i.N_Sd)} ${U.fU()}</span>
    <span class="k">M_ip,Sd</span><span class="v">${U.moment(i.M_ip_Sd)} ${U.mU()}</span>
    <span class="k">M_op,Sd</span><span class="v">${U.moment(i.M_op_Sd)} ${U.mU()}</span></div></div>`;
  // ---- STRESS DERIVATION — chord sides (Begin/End) -> average -> section props -> sigma (NORSOK p.31) ----
  let stressCard = `<div class="legend">The chord carries two loadings at a joint (one per side of the brace intersection); NORSOK p.31 requires their AVERAGE in eq (6.54)/(6.55). Chord face = ${sideLbl(cd.side)} (from the gap/side convention — also marked on the 2D schematic).</div>`;
  const sides = cd.chord_side || [];
  if(sides.length){
    stressCard += `<table><tr><th>side</th><th>N_chord</th><th>M_ip,chord</th><th>M_op,chord</th></tr>
      ${sides.map((s,k)=>`<tr><td>${k===0?'Begin':(k===1?'End':'#'+(k+1))}</td>
        <td class="val">${U.force(s.N_chord)} ${U.fU()}</td>
        <td class="val">${U.moment(s.M_ip)} ${U.mU()}</td>
        <td class="val">${U.moment(s.M_op)} ${U.mU()}</td></tr>`).join('')}
      <tr style="border-top:2px solid #cdd4dd"><td><b>average</b></td>
        <td class="val"><b>${U.force(cd.N_chord)} ${U.fU()}</b></td>
        <td class="val"><b>${U.moment(cd.M_ip_chord)} ${U.mU()}</b></td>
        <td class="val"><b>${U.moment(cd.M_op_chord)} ${U.mU()}</b></td></tr></table>`;
  }
  const A_mm2=cd.A!=null?cd.A*1e6:null, I_mm4=cd.I!=null?cd.I*1e12:null, R_mm=mm(cd.R);
  stressCard += step('Chord section properties — CHS, thickness at the joint (p.31)',
    'A=\\dfrac{\\pi}{4}(D^2-d_i^2),\\quad I=\\dfrac{\\pi}{64}(D^4-d_i^4),\\quad R=D/2',
    '', `A=${fN(A_mm2,0)}\\,mm^2,\\ I=${fN(I_mm4/1e6,1)}\\times 10^6\\,mm^4,\\ R=${fN(R_mm,1)}\\,mm`);
  const side=cd.side;
  stressCard += step('σ_a — axial (+ tension)',
    '\\sigma_{a,Sd} = N_{chord}/A',
    `${fN(kN(cd.N_chord),1)}\\,kN\\ /\\ ${fN(A_mm2/1e3,2)}\\times10^3\\,mm^2`,
    fN(MPa(i.sigma_a),1)+'\\,MPa');
  stressCard += step(`σ_my — in-plane bending, chord face ${sideLbl(side)} (z=side·R), sign FLIPPED so + = compression in the footprint (eq 6.54 note)`,
    '\\sigma_{my,Sd} = -\\dfrac{M_{ip,chord}\\cdot(\\text{side}\\cdot R)}{I}',
    `-\\dfrac{${fN(kN(cd.M_ip_chord),2)}\\,kNm\\cdot(${side>=0?'+':'-'}1\\cdot ${fN(R_mm,1)}\\,mm)}{${fN(I_mm4/1e6,1)}\\times10^6\\,mm^4}`,
    fN(MPa(i.sigma_my),1)+'\\,MPa');
  stressCard += step('σ_mz — out-of-plane bending (sign irrelevant — enters Q_f only squared, via A²)',
    '\\sigma_{mz,Sd} = \\dfrac{M_{op,chord}\\cdot R}{I}',
    `\\dfrac{${fN(kN(cd.M_op_chord),2)}\\,kNm\\cdot ${fN(R_mm,1)}\\,mm}{${fN(I_mm4/1e6,1)}\\times10^6\\,mm^4}`,
    fN(MPa(i.sigma_mz),1)+'\\,MPa');
  const stressBlock=`<div class="sec"><h4>Chord stress derivation — averaged sides → σ (NORSOK p.31)</h4>${stressCard}</div>`;
  // ---- A² + Q_f,moment (SHARED across K/Y/X — Table 6-4 "All joints, brace moment" row only) ----
  const fy = MPa(i.fy_chord), sa = MPa(i.sigma_a), smy = MPa(i.sigma_my), smz = MPa(i.sigma_mz);
  const Cmo = b.C_moment || {};
  let a2Card = step('Chord utilisation A² — eq (6.55) (shared by all classes)',
    'A^2 = \\left(\\dfrac{\\sigma_{a,Sd}}{f_y}\\right)^2 + \\dfrac{\\sigma_{my,Sd}^2+\\sigma_{mz,Sd}^2}{1.62\\,f_y^2}',
    `\\left(\\dfrac{${fp(sa,1)}}{${fN(fy,0)}}\\right)^2 + \\dfrac{${fp(smy,1)}^2+${fp(smz,1)}^2}{1.62\\cdot ${fN(fy,0)}^2}`,
    fN(b.Qf_axial_A2,4));
  a2Card += step(`Q_f, moment — C₁=${fN(Cmo.C1,2)}, C₂=${fN(Cmo.C2,2)}, C₃=${fN(Cmo.C3,2)} (${Cmo.note||''} — Table 6-4 has ONE row for moment, no K/Y/X split)`,
    'Q_f = 1 + C_1\\dfrac{\\sigma_{a,Sd}}{f_y} - C_2\\dfrac{\\sigma_{my,Sd}}{1.62\\,f_y} - C_3\\,A^2',
    `1 + ${fN(Cmo.C1,2)}\\cdot\\dfrac{${fp(sa,1)}}{${fN(fy,0)}} - ${fN(Cmo.C2,2)}\\cdot\\dfrac{${fp(smy,1)}}{1.62\\cdot ${fN(fy,0)}} - ${fN(Cmo.C3,2)}\\cdot ${fN(b.Qf_moment_A2,4)}`,
    fN(b.Qf_moment,3));
  const braceT=i.T, braceD=i.d, sinT=i.sin_theta, gM=i.gamma_M;
  a2Card += step('In-plane bending resistance M_Rd,ip — eq (6.53) (Q_u,ipb shared by all classes, Table 6-3)',
    'M_{Rd,ip} = \\dfrac{f_y\\,T^2\\,d}{\\gamma_M \\sin\\theta}\\,Q_{u,ipb}\\,Q_{f,mom}',
    `\\dfrac{${fN(fy,0)}\\cdot ${fN(braceT*1e3,0)}^2\\cdot ${fN(braceD*1e3,0)}}{${fN(gM,2)}\\cdot ${fN(sinT,3)}}\\cdot ${fN(b.Qu_ipb,3)}\\cdot ${fN(b.Qf_moment,3)}`,
    U.moment(b.M_Rd_ip)+' '+U.mU());
  a2Card += step('Out-of-plane bending resistance M_Rd,op — eq (6.53)',
    'M_{Rd,op} = \\dfrac{f_y\\,T^2\\,d}{\\gamma_M \\sin\\theta}\\,Q_{u,opb}\\,Q_{f,mom}',
    `\\dfrac{${fN(fy,0)}\\cdot ${fN(braceT*1e3,0)}^2\\cdot ${fN(braceD*1e3,0)}}{${fN(gM,2)}\\cdot ${fN(sinT,3)}}\\cdot ${fN(b.Qu_opb,3)}\\cdot ${fN(b.Qf_moment,3)}`,
    U.moment(b.M_Rd_op)+' '+U.mU());
  const a2Block=`<div class="sec"><h4>Chord utilisation A² &amp; moment resistance — 6.4.3.2–4, eq (6.53)/(6.55), Table 6-3/6-4</h4>${a2Card}</div>`;
  // ---- PER-MODE AXIAL BLOCKS — K (per gap), Y, X — each shown ONLY if it enters the check (fr>0) ----
  const pcls = b.per_class || {};
  const modeBlock = (title, clsKey, extra) => {
    const cc = pcls[clsKey]; if(!cc || cc.fr<=1e-9) return '';
    const Cax=cc.C_axial||{};
    let card = step(`Q_f, axial — class ${clsKey}, C₁=${fN(Cax.C1,2)}, C₂=${fN(Cax.C2,2)}, C₃=${fN(Cax.C3,2)} (${Cax.note||''})`,
      'Q_f = 1 + C_1\\dfrac{\\sigma_{a,Sd}}{f_y} - C_2\\dfrac{\\sigma_{my,Sd}}{1.62\\,f_y} - C_3\\,A^2',
      `1 + ${fN(Cax.C1,2)}\\cdot\\dfrac{${fp(sa,1)}}{${fN(fy,0)}} - ${fN(Cax.C2,2)}\\cdot\\dfrac{${fp(smy,1)}}{1.62\\cdot ${fN(fy,0)}} - ${fN(Cax.C3,2)}\\cdot ${fN(cc.Qf_axial_A2,4)}`,
      fN(cc.Qf_axial,3), clsKey);
    card += extra;
    return `<div class="sec"><h4>Mode ${title} — fraction of N_Sd = ${pc(cc.fr)}</h4>${card}</div>`;
  };
  // K: one sub-block PER GAP (user requirement) — each has its own Q_g -> Qu -> N_Rd, shares the K Qf,axial
  const kGaps = b.K_per_gap || [];
  let kBlock = '';
  if(kGaps.length){
    const cc = pcls.K||{};
    const gapCards = kGaps.map((t,idx)=>{
      const label = kGaps.length>1 ? `K${idx+1}` : 'K';
      let c = step(`Q_g — ${label}, gap g=${U.len(t.g_m)} ${U.lU()}, g/D=${fN((t.g_m||0)/i.D,3)}`,
        'Q_g\\ (\\text{note (b) under Table 6-3})', '', fN(t.Q_g,3), 'K');
      c += step(`Q_u,axial — ${label}, Table 6-3 class K, β=${fN(i.beta,3)}, γ=${fN(i.gamma,2)}`,
        'Q_u = \\min\\{(16+1.2\\gamma)\\beta^{1.2}Q_g,\\ 40\\beta^{1.2}Q_g\\}',
        `\\min\\{(16+1.2\\cdot ${fN(i.gamma,2)})\\cdot ${fN(i.beta,3)}^{1.2}\\cdot ${fN(t.Q_g,3)},\\ 40\\cdot ${fN(i.beta,3)}^{1.2}\\cdot ${fN(t.Q_g,3)}\\}`,
        fN(t.Qu_axial,3), 'K');
      c += step(`N_Rd — ${label}, eq (6.52)`,
        'N_{Rd,i} = \\dfrac{f_y\\,T^2}{\\gamma_M \\sin\\theta}\\,Q_{u,i}\\,Q_{f,K}',
        `${fN(b.base_ax/1e3,1)}\\,kN\\cdot ${fN(t.Qu_axial,3)}\\cdot ${fN(t.Qf_axial,3)}`,
        U.force(t.N_Rd)+' '+U.fU(), 'K');
      return `<div class="legend"><b>${label}</b> — ${fN(t.frK*100,1)}% of N_Sd balanced across this gap.</div>`+c;
    }).join('');
    let wCard = gapCards;
    if(kGaps.length>1){
      wCard += step('K weighted axial resistance across gaps — Comm. 6.4.2',
        '\\dfrac{1}{N_{Rd,K}} = \\sum_i \\dfrac{frK_i}{N_{Rd,i}}',
        kGaps.map(t=>`\\dfrac{${fN(t.frK,3)}}{${fN(t.N_Rd/1e3,1)}}`).join('+'),
        fN(1/kGaps.reduce((s,t)=>s+t.frK/t.N_Rd,0)/1e3,1)+'\\,kN', 'K');
    }
    kBlock = `<div class="sec"><h4>Mode K — fraction of N_Sd = ${pc(cc.fr)}${kGaps.length>1?` (split over ${kGaps.length} gaps)`:''}</h4>${wCard}</div>`;
  }
  const yBlock = modeBlock('Y (T/Y)', 'Y', step('Q_u,axial — Table 6-3 class Y',
    b.load_axial==='tension' ? 'Q_u = 30\\beta' : 'Q_u = \\min\\{2.8+(20+0.8\\gamma)\\beta^{1.6},\\ 2.8+36\\beta^{1.6}\\}',
    '', fN(pcls.Y?pcls.Y.Qu_axial:null,3), 'Y')
    + step('N_Rd — eq (6.52)', 'N_{Rd} = \\dfrac{f_y\\,T^2}{\\gamma_M \\sin\\theta}\\,Q_u\\,Q_f',
      `${fN(b.base_ax/1e3,1)}\\,kN\\cdot ${fN(pcls.Y?pcls.Y.Qu_axial:null,3)}\\cdot ${fN(pcls.Y?pcls.Y.Qf_axial:null,3)}`,
      U.force(pcls.Y?pcls.Y.N_Rd:null)+' '+U.fU(), 'Y'));
  const xBlock = modeBlock('X', 'X', step('Q_u,axial — Table 6-3 class X',
    b.load_axial==='tension' ? 'Q_u = 6.4\\,\\gamma^{0.6\\beta^2}' : 'Q_u = (2.8+(12+0.1\\gamma)\\beta)\\,Q_\\beta',
    '', fN(pcls.X?pcls.X.Qu_axial:null,3), 'X')
    + step('N_Rd — eq (6.52)', 'N_{Rd} = \\dfrac{f_y\\,T^2}{\\gamma_M \\sin\\theta}\\,Q_u\\,Q_f',
      `${fN(b.base_ax/1e3,1)}\\,kN\\cdot ${fN(pcls.X?pcls.X.Qu_axial:null,3)}\\cdot ${fN(pcls.X?pcls.X.Qf_axial:null,3)}`,
      U.force(pcls.X?pcls.X.N_Rd:null)+' '+U.fU(), 'X'));
  // ---- weighted-average summary across whichever modes are active ----
  // No active mode (b.no_axial_classification, e.g. a pure-moment brace with N_Sd≈0) means there is
  // no axial resistance to weight-average at all — the block is omitted entirely rather than shown
  // with an empty table and a dangling "1/N_Rd = " formula.
  const activeModes=['K','Y','X'].filter(c=>pcls[c]&&pcls[c].fr>1e-9);
  const NRdKweighted = kGaps.length ? 1/kGaps.reduce((s,t)=>s+t.frK/t.N_Rd,0) : null;
  const modeNRd = c => c==='K' ? NRdKweighted : pcls[c].N_Rd;
  let sumBlock = '';
  if(activeModes.length){
    let sumCard = `<table><tr><th>mode</th><th>fraction</th><th>N_Rd,mode</th></tr>
      ${activeModes.map(c=>`<tr><td><span class="tag tag${c}">${c}</span></td><td class="val">${pc(pcls[c].fr)}</td><td class="val">${U.force(modeNRd(c))} ${U.fU()}</td></tr>`).join('')}
    </table>`;
    sumCard += step('Weighted axial resistance — Comm. 6.4.2 (mixture of K/Y/X)',
      '\\dfrac{1}{N_{Rd}} = \\sum_{\\text{mode}} \\dfrac{fr_{\\text{mode}}}{N_{Rd,\\text{mode}}}',
      activeModes.map(c=>`\\dfrac{${fN(pcls[c].fr,3)}}{${fN(kN(modeNRd(c)),1)}}`).join('+'),
      U.force(b.N_Rd_weighted)+' '+U.fU());
    sumBlock = `<div class="sec"><h4>Weighted axial resistance (all active modes) — Comm. 6.4.2</h4>${sumCard}</div>`;
  } else {
    sumBlock = `<div class="sec"><h4>Axial resistance</h4><div class="legend">No K/Y/X classification for this brace (no axial force) — the axial term of eq. (6.57) is not applicable; only the bending check below applies.</div></div>`;
  }
  // utilisation eq 6.57 — substituted
  const rng=(b.within_range===false)?' <span class="warn">⚠ geometry outside 6.4.3.1 validity — resistance extrapolated</span>':'';
  const overstressed=(b.chord_overstressed===true);
  const overstressedNote=overstressed
    ? `<div class="warn-box" style="margin-top:8px">⛔ <b>Chord wall overstressed:</b> the chord action factor Q_f (eq 6.54) has no floor in NORSOK, and here it collapsed the resistance (N_Rd and/or M_Rd) to zero or below for a class this brace actually uses. The numeric utilisation above can look deceptively low or even negative — this is forced to FAIL regardless of that number, because the chord wall has no meaningful capacity left at this footprint.</div>`
    : '';
  let utilCard = step('Utilisation — eq (6.57)',
    'u = \\dfrac{N_{Sd}}{N_{Rd}} + \\left(\\dfrac{M_{ip,Sd}}{M_{Rd,ip}}\\right)^2 + \\left|\\dfrac{M_{op,Sd}}{M_{Rd,op}}\\right|',
    `${pcTex(b.util_axial)} + ${pcTex(b.util_ipb)} + ${pcTex(b.util_opb)}`,
    `${pcTex(b.util)}\\ \\ \\text{${ok?'PASS':'FAIL'}}`);
  const util=`<div class="sec"><h4>Utilisation — eq (6.57)</h4>${utilCard}
    <div style="margin-top:4px;font-size:15px;font-weight:700;color:${col}">
      util = ${pc(b.util)} &nbsp; ${ok?'✓ PASS':'✗ FAIL'}${rng}</div>${overstressedNote}</div>`;
  const html=`<div class="chk-modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="chk-modal">
      <button class="close" onclick="closeModal()">✕</button>
      <h2>${braceName} — NORSOK 6.4 check</h2>
      <div class="muted" style="font-size:12px">Load effect ${leName} · dominant class ${b.dom_class} · chord-wall check (resistance governed by the chord's own f_y)</div>
      ${geo}${forces}${stressBlock}${a2Block}${kBlock}${yBlock}${xBlock}${sumBlock}${util}
    </div></div>`;
  const d=document.createElement('div'); d.id='chkModal'; d.innerHTML=html;
  document.body.appendChild(d);
  if(window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise([d]).catch(e=>uiLog('warn','MathJax typeset failed: '+e));
}
function closeModal(){ const m=document.getElementById('chkModal'); if(m) m.remove(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ---- SHEET 2: the results — small informative 2D view + LE result tables ----
function renderResults(){
  if(!DATA) return;
  const env=(viewMode==='env');
  const L=resultsData();
  if(!L){
    document.getElementById('app').innerHTML=`<div class="res">${DATA?leBar(leList()):''}<div class="panel" style="padding:24px;color:#777">

    return;
  }
  const multiplanar = (DATA.coplanar===false);
  // in envelope mode the equilibrium / brace-forces cards are hidden (they are per-LE quantities);
  // the right column then only holds a short note so the 2D + combined table carry the sheet.
  const rightCol = env
    ? `<div class="le-card panel" style="color:#555;font-size:12px"><h3 style="margin-top:0">Envelope</h3>
        Each brace shows its <b>governing load effect</b> — the load effect with the highest utilisation
        (see the column below). Node-equilibrium and in-plane brace-force tables are per-LE;
        switch to <b>per LC</b> to inspect a single load effect.</div>`
    : `${eqCard(L.eqRow)}${bfCard(L.bfRow, L.csRow)}`;
  document.getElementById('app').innerHTML=`
  <div class="res">
    ${leBar(L.LEs)}
    <div class="res-cols">
      <div class="res-left" id="resLeftWrap">
        <div class="le-card panel">
          <h3 style="margin-top:0">Joint — ${L.cur.name}</h3>
          <div id="viewbox"></div>
          <div class="res-legend">
            utilisation:&nbsp;
            <span class="sw" style="background:${utilColor(0)}"></span>0
            <span class="sw" style="background:${utilColor(0.5)}"></span>
            <span class="sw" style="background:${utilColor(0.85)}"></span>
            <span class="sw" style="background:${utilColor(1.0)}"></span>1.0&nbsp;·&nbsp;
            <span class="sw" style="background:${C.chord}"></span>chord&nbsp;·&nbsp;
            <span class="sw" style="background:#bbb"></span>no check
            &nbsp;·&nbsp;<span class="muted">wheel = zoom, drag = pan, dbl-click = reset</span>
          </div>
        </div>
      </div>
      <div class="res-splitter-h" id="resSplitterH" title="Drag to resize the schematic width"></div>
      <div class="res-right" id="res-right">
        ${rightCol}
      </div>
    </div>
    <div class="res-splitter-v" id="resSplitterV" title="Drag to resize the schematic height"></div>
    <div class="res-full">
      ${classChecksCard(L.clRow, L.jcRow)}
    </div>
  </div>`;
  if(!multiplanar) draw2dResults(L); else {
    document.getElementById('viewbox').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#b35900;font:13px Segoe UI;text-align:center;padding:20px">
      ⚠ Multiplanar joint — no single 2D joint plane. See the 3D model on the Connection sheet.</div>`;
  }
  document.querySelector('.res').style.setProperty('--res-left-w', resLeftW+'px');
  document.querySelector('.res').style.setProperty('--res-cols-h', resColsH+'px');
  attachResSplitters();
  bindLeDropDismiss();   // outside-click closes the custom LE dropdown
}
// Two independent splitters for the results-sheet schematic, mirroring the model's #splitter
// (attachSplitter) exactly in look, feel, and hard-stop logic. Both persist across re-renders.
//   resSplitterH (horizontal drag) -> resLeftW  = width of .res-left (2D box + legend together)
//   resSplitterV (vertical drag)   -> resColsH  = height of .res-cols (2D box + right column together),
//                                      i.e. the whole top row vs. the classification table below it.
// Hard stops: dragging H right stops once .res-right would drop below its usable minimum (280px, same
// floor as .res-right's min-width); dragging V down stops once .res-cols would leave less than its own
// usable minimum (220px, same floor as #viewbox's min-height) for the window's available height.
let resLeftW=440, resColsH=420;
function attachResSplitters(){
  const sh=document.getElementById('resSplitterH');
  if(sh){
    sh.onmousedown=e=>{
      e.preventDefault();
      const resEl=document.querySelector('.res');
      const startX=e.clientX, startW=resLeftW;
      const maxW=Math.max(280, resEl.clientWidth-280-20);   // keep .res-right at least ~280px (its min-width)
      const move=ev=>{
        resLeftW=Math.min(maxW, Math.max(280, startW+(ev.clientX-startX)));
        resEl.style.setProperty('--res-left-w', resLeftW+'px');
        const L=resultsData(); if(L && DATA.coplanar!==false) draw2dResults(L);   // SVG -> cheap live refit
      };
      const up=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
      window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    };
  }
  const sv=document.getElementById('resSplitterV');
  if(sv){
    sv.onmousedown=e=>{
      e.preventDefault();
      const resEl=document.querySelector('.res'), colsEl=document.querySelector('.res-cols');
      const leCard=document.querySelector('#resLeftWrap .le-card'), rightEl=document.getElementById('res-right');
      const startY=e.clientY, startH=resColsH;
      // hard stop, upper bound: .res-cols can't grow past the room actually available in the window
      // (its own top + a small margin for the leBar are already spoken for) — beyond that the table
      // below it would be pushed off-screen with nothing gained, so stop right there.
      const colsTop=colsEl.getBoundingClientRect().top;
      const maxH=Math.max(220, window.innerHeight - colsTop - 60);
      // hard stop, lower bound: .res-cols must stay tall enough for the taller of the two columns —
      // the WHOLE left card (h3 title + #viewbox's own 220px floor + the legend line, not just #viewbox
      // alone, or the title/legend get clipped) AND the right column's actual content (equilibrium +
      // brace-forces cards' natural scrollHeight, not its clamped/scrolled offsetHeight, so the stop
      // reflects what the tables need to show without their own inner scrollbar).
      const chromeH=leCard.offsetHeight-document.getElementById('viewbox').offsetHeight;   // title+legend
      const leftMinH=220+Math.max(0,chromeH);
      const rightMinH=rightEl?rightEl.scrollHeight:0;
      const minH=Math.max(leftMinH, rightMinH);
      const move=ev=>{
        resColsH=Math.min(maxH, Math.max(minH, startH+(ev.clientY-startY)));
        resEl.style.setProperty('--res-cols-h', resColsH+'px');
        const L=resultsData(); if(L && DATA.coplanar!==false) draw2dResults(L);
      };
      const up=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
      window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    };
  }
}

// ---- SHEET 1: the connection model (3D/2D) + verdict + member/parameter/gap tables ----
function renderConnection(){
  if(!DATA) return;
  const p=DATA.params;
  const rng=(x,lo,hi)=>(x!=null&&x>=lo&&x<=hi)?'<span class="ok">✓</span>':'<span class="err">✗</span>';
  const fitOut=new Set(DATA.plane_outliers||[]);      // braces NOT used to build the plane (FIT outliers)
  const evalOut=new Set(DATA.eval_outliers||[]);      // braces beyond the EVAL tolerance (multiplanar)
  const ctolDeg=(DATA.coplanar_tol_deg!=null?DATA.coplanar_tol_deg:15);
  // "fit" column: ✓ used to build the plane / ✗ excluded from the fit (with marker if also eval-outlier)
  function fitCell(name){
    if(evalOut.has(name)) return '<span class="err" title="beyond eval tol — multiplanar">✗</span>';
    if(fitOut.has(name))  return '<span class="warn" title="not used to build the plane (beyond fit tol)">–</span>';
    return '<span class="ok" title="used to build the plane">✓</span>';
  }
  const braceRows=DATA.braces.map(b=>`<tr><td>${b.name}</td><td class="val">${b.section.name||'?'}</td><td class="val">${U.deg(b.theta_deg)}</td><td class="val">${b.beta!=null?U.num(b.beta):'?'}</td><td class="val ${b.coplanar_dev_deg>ctolDeg?'err':''}">${U.deg(b.coplanar_dev_deg)}</td><td>${fitCell(b.name)}</td></tr>`).join('');
  const v=DATA.verdict||{status:'?',errors:[],warnings:[]};
  const vcol={OK:'#1a7f37',WARNING:'#b35900',ERROR:'#c0392b'}[v.status]||'#666';
  const vbg ={OK:'#eaf7ee',WARNING:'#fff7e6',ERROR:'#fdecea'}[v.status]||'#f0f0f0';
  const vlabel={OK:'✓ OK',WARNING:'⚠ WARNING',ERROR:'✗ ERROR — outside simple-joint scope'}[v.status]||v.status;
  const diag=`<div style="background:${vbg};border:1px solid ${vcol};border-radius:6px;padding:8px 10px;margin-top:10px">
      <div style="font-weight:700;color:${vcol};font-size:13px">${vlabel}</div>
      ${v.errors.length?`<div style="margin-top:5px"><b style="color:#c0392b">Errors:</b><ul style="margin:3px 0 0 16px;padding:0">${v.errors.map(d=>`<li>${d}</li>`).join('')}</ul></div>`:''}
      ${v.warnings.length?`<div style="margin-top:5px"><b style="color:#b35900">Warnings:</b><ul style="margin:3px 0 0 16px;padding:0">${v.warnings.map(d=>`<li>${d}</li>`).join('')}</ul></div>`:''}
      ${(!v.errors.length&&!v.warnings.length)?'<div style="margin-top:4px;color:#1a7f37">No remarks.</div>':''}
      ${DATA.plane_fit_basis?`<div style="margin-top:6px;font-size:11px;color:#777">joint plane built from: ${DATA.plane_fit_basis}</div>`:''}
    </div>`;
  document.getElementById('app').innerHTML=`
  <div class="wrap">
    <div class="panel canvas-panel">
      <div class="tabs">
        <button class="${TAB==='2d'?'active':''}" onclick="setTab('2d')">2D plane (NORSOK)</button>
        <button class="${TAB==='3d'?'active':''}" onclick="setTab('3d')">3D tubes (vs IDEA)</button>
      </div>
      <div id="viewbox"></div>
      <div class="canvas-hint"><span class="sw" style="background:${C.chord}"></span>chord &nbsp;<span class="sw" style="background:${C.brace}"></span>brace &nbsp;<span class="sw" style="background:${C.node}"></span>node ${TAB==='3d'?'— left-drag = pan, right-drag = rotate, wheel = zoom · top-left: projection · top-right: ViewCube.':'— wheel = zoom, drag = pan, dbl-click = reset · top-right: ↻/↺ rotate 90°, ⇄ flip.'}</div>
    </div>
    <div class="splitter" id="splitter" title="Drag to resize the info panel"></div>
    <div class="info-panel panel">
      <h3>Members (${DATA.connection})</h3>
      <table><tr><th>member</th><th>section</th><th title="angle between the brace and the chord axis">θ</th><th title="diameter ratio, brace/chord">β</th><th title="deviation of this brace's axis from the reference joint plane">dev⊥</th><th title="✓ used to build the plane · – excluded from fit · ✗ beyond tolerance (multiplanar)">fit</th></tr>
        <tr><td>${DATA.chord.name} <span class="muted">(chord)</span></td><td class="val">${DATA.chord.section.name||'?'}</td><td>—</td><td>—</td><td>—</td><td class="muted" title="chord defines the plane axis">ax</td></tr>
        ${braceRows}
      </table>
      ${(DATA.params_all&&DATA.params_all.length)?`<h3>Parameters (per brace)</h3>
        <table><tr><th>brace</th><th title="diameter ratio, brace/chord — valid range shown below">β<br><span class="muted">0.2–1.0</span></th><th title="chord radius/thickness ratio — valid range shown below">γ<br><span class="muted">10–50</span></th><th title="wall thickness ratio, brace/chord">τ</th><th title="angle between the brace and the chord axis — valid range shown below">θ<br><span class="muted">30–90°</span></th></tr>
        ${DATA.params_all.map(q=>`<tr>
          <td>${q.name}</td>
          <td class="val">${q.beta!=null?U.num(q.beta):'?'} ${rng(q.beta,0.2,1.0)}</td>
          <td class="val">${q.gamma!=null?U.num(q.gamma):'?'} ${rng(q.gamma,10,50)}</td>
          <td class="val">${q.tau!=null?U.num(q.tau):'?'}</td>
          <td class="val">${U.deg(q.theta_deg)} ${rng(q.theta_deg,30,90)}</td>
        </tr>`).join('')}</table>`:''}
      ${(DATA.gaps&&DATA.gaps.length)?`<h3>Gaps</h3>
        <table><tr><th>between</th><th title="which chord face the pair sits on">side</th><th title="clear toe-to-toe spacing; negative means overlap">gap [${U.lU()}]</th></tr>
        ${DATA.gaps.map(g=>`<tr><td>${g.between[0]}–${g.between[1]}</td><td class="val">${sideLbl(g.side)}</td><td class="val ${g.gap_m<0?'err':''}">${U.len(g.gap_m)}</td></tr>`).join('')}</table>`:''}
      ${diag}
    </div>
  </div>`;
  document.querySelector('.wrap').style.setProperty('--info-w', infoW+'px');  // re-apply chosen width
  attachSplitter();
  if(TAB==='2d') draw2d(); else draw3d();
}

// draggable splitter: changes the info-panel width; the canvas (flex:1) takes the rest, so the bottom
// scrollbar disappears once the panel is wide enough for its tables. Width persists across re-renders.
let infoW=330;
function attachSplitter(){
  const sp=document.getElementById('splitter'); if(!sp) return;
  const wrap=document.querySelector('.wrap');
  sp.onmousedown=e=>{
    e.preventDefault();
    const startX=e.clientX, startW=infoW;
    const maxW=Math.max(330, wrap.clientWidth-360);   // keep the canvas at least ~360px
    const move=ev=>{ infoW=Math.min(maxW, Math.max(220, startW+(startX-ev.clientX)));
      wrap.style.setProperty('--info-w', infoW+'px');
      if(TAB==='2d') draw2d(); };   // 2D is SVG -> cheap live refit; 3D rebuilt on release
    const up=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up);
      if(TAB==='3d') draw3d(); };   // rebuild WebGL canvas at the new width
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  };
}

// redraw on window resize so the view fills the (resized) window
let _rsz=null;
window.addEventListener('resize',()=>{ if(!DATA) return; clearTimeout(_rsz); _rsz=setTimeout(()=>{
  if(PAGE==='results'){ const L=resultsData(); if(L && DATA.coplanar!==false) draw2dResults(L); }
  else if(TAB==='2d') draw2d(); else draw3d();
},120); });
</script>
